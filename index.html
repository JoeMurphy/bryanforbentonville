document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ecoration:none\">Get Involved<\u002Fa>\n      <a href=\"https://secure.anedot.com/bryan-for-bentonville/9015e221-a05f-4154-9a60-e6b4743db7c4\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#1d3a2e;background:#e0b64f;padding:10px 22px;text-decoration:none\">Donate<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;align-items:stretch;background:#f6f2e8\">\n    <div id=\"hero-text\" style=\"flex:1 1 460px;min-width:min(300px,100%);padding:64px 48px 64px 5%;display:flex;flex-direction:column;justify-content:center\">\n      <div style=\"font-size:13px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#8a7440;margin-bottom:18px\">Vote Tuesday, November 3, 2026<\u002Fdiv>\n      <div id=\"hero-title\" style=\"font-weight:900;font-size:clamp(48px,7vw,84px);line-height:.96;text-transform:uppercase;letter-spacing:-.015em;color:#1d3a2e\">Bryan for Bentonville<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:clamp(19px,2.4vw,26px);color:#8a7440;margin:14px 0 22px;text-transform:uppercase;letter-spacing:.04em\">City Council, Ward 1<\u002Fdiv>\n      <p style=\"font-family:'Public Sans',sans-serif;font-size:20px;line-height:1.6;color:#41584c;margin:0 0 30px;max-width:44ch;text-wrap:pretty;font-weight:600\">Sound finances. Smart growth. Vibrant community.<\u002Fp>\n      <div id=\"hero-ctas\" style=\"display:flex;gap:14px;flex-wrap:wrap\">\n        <a href=\"https://secure.anedot.com/bryan-for-bentonville/9015e221-a05f-4154-9a60-e6b4743db7c4\" target=\"_blank\" rel=\"noopener\" style=\"font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#f6f2e8;background:#1d3a2e;padding:16px 32px;text-decoration:none\">Donate<\u002Fa>\n        <a href=\"#get-involved\" style=\"font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#1d3a2e;border:3px solid #1d3a2e;padding:13px 29px;text-decoration:none\">Get Involved<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"hero-photo\" style=\"flex:0 1 440px;min-width:min(280px,100%);background:#e0b64f;padding:40px 40px 0;display:flex;align-items:flex-end;justify-content:center\">\n      <img src=\"a51929d5-6d1c-49c1-b469-46e1b534e417\" alt=\"Austin Bryan, candidate for Bentonville City Council Ward 1\" style=\"display:block;width:100%;max-width:380px;aspect-ratio:3/4;object-fit:cover;object-position:50% 15%\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"about\" style=\"padding:64px 5%;background:#f6f2e8\">\n    <div style=\"font-size:13px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#8a7440;margin-bottom:16px\">About Austin<\u002Fdiv>\n    <div style=\"font-weight:900;font-size:clamp(28px,3.4vw,40px);text-transform:uppercase;letter-spacing:-.01em;margin-bottom:24px\">I'm Austin Bryan.<\u002Fdiv>\n    <div style=\"font-family:'Public Sans',sans-serif;font-size:17.5px;line-height:1.7;color:#41584c;max-width:78ch;display:flex;flex-direction:column;gap:18px\">\n      <p style=\"margin:0;text-wrap:pretty\">I'm running for Bentonville City Council, Ward 1, because I believe we must spend better and grow smarter, all while we preserve the unique culture that makes our city vibrant.<\u002Fp>\n      <p style=\"margin:0;text-wrap:pretty\">As a Certified Financial Planner™ and Principal/COO at HoganTaylor, my entire career is built on helping people and organizations make disciplined, strategic decisions with their money. I am running to bring that same financial accountability to City Hall.<\u002Fp>\n      <p style=\"margin:0;text-wrap:pretty\">Our city is growing fast. We shouldn't stop growth, but we must shape it. Having served on the Plan Bentonville Steering Committee, the Parks &amp; Recreation Advisory Board, the Mayor's Community Council, the Rogers-Lowell Chamber Board, and as founding board chair of Leadership Benton County Alumni, I know firsthand what it takes to responsibly serve our neighborhoods. I offer steady, experienced hands to ensure our expansion strengthens our infrastructure, safeguards our financial future, and continues to fund the arts and vibrant experiences that make Bentonville an incredible place to live.<\u002Fp>\n      <p style=\"margin:0;text-wrap:pretty\">Most importantly, I am a husband to Anna, a dad of two children and a very good dog, Hermione.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"priorities\" style=\"background:#1d3a2e;color:#f6f2e8;padding:64px 5%\">\n    <div style=\"display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin-bottom:44px\">\n      <div style=\"font-weight:900;font-size:40px;text-transform:uppercase;letter-spacing:-.01em\">The Platform<\u002Fdiv>\n      <div style=\"height:4px;flex:1;background:#e0b64f;min-width:80px;align-self:center\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:0\">\n\n      <div style=\"padding:36px 0;border-top:1px solid rgba(246,242,232,.25)\">\n        <div style=\"display:flex;gap:24px;flex-wrap:wrap;align-items:baseline;margin-bottom:16px\">\n          <div style=\"font-weight:900;font-size:44px;color:#e0b64f;flex:0 0 70px\">01<\u002Fdiv>\n          <div style=\"flex:1 1 300px\">\n            <div style=\"font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.02em\">Sound Finances<\u002Fdiv>\n            <p style=\"font-family:'Public Sans',sans-serif;font-size:17px;line-height:1.6;color:#e0b64f;margin:8px 0 0;font-weight:600;text-wrap:pretty\">Every dollar the City spends belongs to you. I will bring financial discipline and rigorous oversight to serve you.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"plat-detail\" style=\"margin-left:min(94px,8vw);max-width:76ch\">\n          <p style=\"font-family:'Public Sans',sans-serif;font-size:16px;line-height:1.7;color:rgba(246,242,232,.8);margin:0 0 18px;text-wrap:pretty\">City budgeting shouldn't be about reacting to \"surprise\" bills. It requires active, long-term financial management strategy. As a Certified Financial Planner™, I spend my days building sustainable, disciplined financial roadmaps for families and organizations. I will bring that exact same predictive planning to Bentonville's budget. Our tax dollars must be spent transparently, optimized ruthlessly, and invested with a clear eye on the next generation.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Rigorous budget oversight:<\u002Fstrong> ensuring our tax dollars fund essential community improvements.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Long-term fiscal planning:<\u002Fstrong> protecting the city from nonessential debt and budget surprises through disciplined, strategic financial planning.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Absolute transparency:<\u002Fstrong> pushing for plain-language, easily accessible budget summaries residents can actually read and understand before the Council votes.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Bring the same rigor I use managing client wealth every day as a Certified Financial Planner™ to how the city budgets and spends taxpayer dollars.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Scrutinize every new bond or debt proposal against its real, long-term cost to Bentonville taxpayers.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Support regular independent reviews of city departments and spending to find opportunities for smarter, proactive management.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Prioritize infrastructure investment by actual need and long-term value, not by which project has the most political momentum.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Protect the city's reserve funds so Bentonville stays financially strong even in hard times.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 0;border-top:1px solid rgba(246,242,232,.25)\">\n        <div style=\"display:flex;gap:24px;flex-wrap:wrap;align-items:baseline;margin-bottom:16px\">\n          <div style=\"font-weight:900;font-size:44px;color:#e0b64f;flex:0 0 70px\">02<\u002Fdiv>\n          <div style=\"flex:1 1 300px\">\n            <div style=\"font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.02em\">Smart, Proactive Growth<\u002Fdiv>\n            <p style=\"font-family:'Public Sans',sans-serif;font-size:17px;line-height:1.6;color:#e0b64f;margin:8px 0 0;font-weight:600;text-wrap:pretty\">I'll make sure our City's infrastructure keeps pace with our expansion, and that growth serves the people who already call this city home, not just the people moving here next.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"plat-detail\" style=\"margin-left:min(94px,8vw);max-width:76ch\">\n          <p style=\"font-family:'Public Sans',sans-serif;font-size:16px;line-height:1.7;color:rgba(246,242,232,.8);margin:0 0 18px;text-wrap:pretty\">Bentonville is among the fastest-growing cities in the region, but expansion shouldn't come at the cost of the people who built this community. Having served on the Plan Bentonville Steering Committee, I understand the delicate balance of zoning and development. We must enforce smart restrictions so that new commercial and residential developments pay their fair share to support our roads, utilities, and emergency services. I will make sure our city planning prioritizes the families living here today, while continuing to make Bentonville appealing to whoever is moving here tomorrow.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Infrastructure first:<\u002Fstrong> push infrastructure and traffic planning to keep pace with new opportunities, rather than playing catch-up after congestion already hits.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Neighborhood protection:<\u002Fstrong> protect the character of established neighborhoods when evaluating infill and redevelopment proposals.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Smart development restrictions:<\u002Fstrong> mandating new development pays its fair share toward the roads, water, and infrastructure it requires, instead of passing those costs on to existing residents.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Apply firsthand experience from the Plan Bentonville Steering Committee to guide zoning and land-use decisions that actually reflect resident input.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Support a range of housing options across price points so teachers, first responders, young families, and longtime residents can all afford to stay in Bentonville.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Require real, meaningful public comment periods before major zoning or land-use changes are decided, not just a formality after the decision is already made.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:36px 0;border-top:1px solid rgba(246,242,232,.25);border-bottom:1px solid rgba(246,242,232,.25)\">\n        <div style=\"display:flex;gap:24px;flex-wrap:wrap;align-items:baseline;margin-bottom:16px\">\n          <div style=\"font-weight:900;font-size:44px;color:#e0b64f;flex:0 0 70px\">03<\u002Fdiv>\n          <div style=\"flex:1 1 300px\">\n            <div style=\"font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.02em\">Cultivating a Vibrant Community<\u002Fdiv>\n            <p style=\"font-family:'Public Sans',sans-serif;font-size:17px;line-height:1.6;color:#e0b64f;margin:8px 0 0;font-weight:600;text-wrap:pretty\">Growth shouldn't cost us what makes Bentonville, Bentonville. I will fight to protect and invest in the arts, parks, and experiences that make Bentonville an incredible place to live.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"plat-detail\" style=\"margin-left:min(94px,8vw);max-width:76ch\">\n          <p style=\"font-family:'Public Sans',sans-serif;font-size:16px;line-height:1.7;color:rgba(246,242,232,.8);margin:0 0 18px;text-wrap:pretty\">What makes Bentonville special isn't just our rapid growth and amenities, it's our unique identity. We are a world-class hub for arts, outdoor experiences, culinary innovation, and community gatherings. Through my work on the Parks &amp; Recreation Advisory Board and the Mayor's Community Council, I've seen firsthand how these spaces and experiences connect us. I will champion continued, disciplined investment in local culture, trail systems, public arts, and community spaces. We will grow, but we must keep our vibrant, connected soul entirely intact.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Sustained arts &amp; culture funding:<\u002Fstrong> backing initiatives that support local artists, public exhibitions, and unique cultural programming.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">World-class parks &amp; trails:<\u002Fstrong> maintaining and expanding our parks and trail networks, funded and built ahead of population growth, not years behind it.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Preserving community character:<\u002Fstrong> ensuring public spaces remain family-friendly, accessible, and distinctly \"Bentonville,\" and protecting downtown's historic character in future development and design standards.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\"><strong style=\"color:#f6f2e8\">Downtown development:<\u002Fstrong> champion locally-owned businesses on the square and throughout Bentonville, not just the national chains that follow rapid growth.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Draw on years of service on the Parks &amp; Recreation Advisory Board to protect and expand green space, trails, and parks as the population grows.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Support community gathering spaces, local events, and traditions that bring neighbors together across the city.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:rgba(246,242,232,.8)\"><div style=\"flex:none;width:8px;height:8px;background:#e0b64f;margin-top:8px\"><\u002Fdiv><p style=\"margin:0;text-wrap:pretty\">Use board experience with the Rogers-Lowell Chamber to keep local business voices at the table when growth decisions are made.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"get-involved\" style=\"padding:64px 5%;background:#f6f2e8\">\n    <div style=\"font-size:13px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#8a7440;margin-bottom:16px\">Get Involved<\u002Fdiv>\n    <div style=\"font-weight:900;font-size:clamp(28px,3.4vw,40px);text-transform:uppercase;letter-spacing:-.01em;margin-bottom:12px\">Bentonville's future is worth showing up for.<\u002Fdiv>\n    <p style=\"font-family:'Public Sans',sans-serif;font-size:17px;line-height:1.6;color:#41584c;margin:0 0 36px;max-width:70ch;text-wrap:pretty\">Here's how you can help.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px\">\n      <div style=\"padding:32px;border:3px solid #1d3a2e;display:flex;flex-direction:column;gap:12px\">\n        <div style=\"font-weight:900;font-size:32px;color:#8a7440\">1<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:20px;text-transform:uppercase;letter-spacing:.02em\">Make a donation<\u002Fdiv>\n        <p style=\"font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:#41584c;margin:0;text-wrap:pretty\">Campaigns are expensive, and we need your support.<\u002Fp>\n        <a href=\"https://secure.anedot.com/bryan-for-bentonville/9015e221-a05f-4154-9a60-e6b4743db7c4\" target=\"_blank\" rel=\"noopener\" style=\"font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#f6f2e8;background:#1d3a2e;padding:13px 24px;text-decoration:none;align-self:flex-start;margin-top:auto\">Donate<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"padding:32px;border:3px solid #1d3a2e;display:flex;flex-direction:column;gap:12px\">\n        <div style=\"font-weight:900;font-size:32px;color:#8a7440\">2<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:20px;text-transform:uppercase;letter-spacing:.02em\">Invite Austin over<\u002Fdiv>\n        <p style=\"font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:#41584c;margin:0;text-wrap:pretty\">Invite Austin to drop by your neighborhood event or gathering, for just a few minutes. We need to introduce Austin to as many Bentonville residents as possible.<\u002Fp>\n        <a href=\"mailto:austin@bryanforbentonville.com\" style=\"font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#1d3a2e;border:3px solid #1d3a2e;padding:10px 21px;text-decoration:none;align-self:flex-start;margin-top:auto\">Email Austin<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"padding:32px;border:3px solid #1d3a2e;display:flex;flex-direction:column;gap:12px\">\n        <div style=\"font-weight:900;font-size:32px;color:#8a7440\">3<\u002Fdiv>\n        <div style=\"font-weight:800;font-size:20px;text-transform:uppercase;letter-spacing:.02em\">Display a yard sign<\u002Fdiv>\n        <p style=\"font-family:'Public Sans',sans-serif;font-size:15.5px;line-height:1.6;color:#41584c;margin:0;text-wrap:pretty\">Let us know you're interested, and we'll deliver one.<\u002Fp>\n        <a href=\"https://airtable.com/appHRJmZgwadaq9ge/shrkJwQcJVAxdc9I7\" target=\"_blank\" rel=\"noopener\" style=\"font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#1d3a2e;border:3px solid #1d3a2e;padding:10px 21px;text-decoration:none;align-self:flex-start;margin-top:auto\">Request a Sign<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#e0b64f;padding:56px 5%;display:flex;flex-wrap:wrap;align-items:center;gap:28px\">\n    <div style=\"flex:1 1 320px\">\n      <div style=\"font-weight:900;font-size:clamp(24px,3vw,34px);text-transform:uppercase;color:#1d3a2e;letter-spacing:-.01em\">Join us. Let's keep Bentonville growing the right way, together.<\u002Fdiv>\n      <p style=\"font-family:'Public Sans',sans-serif;font-size:16px;color:#4a3f1e;margin:8px 0 0\">Tell us a little about yourself and we'll keep you posted before Election Day.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;flex:0 0 auto\">\n      <a href=\"https://airtable.com/appHRJmZgwadaq9ge/shrkJwQcJVAxdc9I7\" target=\"_blank\" rel=\"noopener\" style=\"font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#f6f2e8;background:#1d3a2e;padding:16px 32px;text-decoration:none\">Get Connected<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#152b22;color:rgba(246,242,232,.6);text-align:center;padding:22px;font-size:13px;font-family:'Public Sans',sans-serif\">Paid for by Friends of Austin Bryan · BryanForBentonville.com<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    if (document.getElementById('jsonld-person')) return;\n    const s = document.createElement('script');\n    s.type = 'application/ld+json';\n    s.id = 'jsonld-person';\n    s.textContent = JSON.stringify({\n      \"@context\": \"https://schema.org\",\n      \"@type\": \"Person\",\n      \"name\": \"Austin Bryan\",\n      \"url\": \"https://bryanforbentonville.com/\",\n      \"image\": \"https://bryanforbentonville.com/og.jpg\",\n      \"jobTitle\": \"Candidate for Bentonville City Council, Ward 1\",\n      \"hasCredential\": \"Certified Financial Planner (CFP)\",\n      \"worksFor\": {\"@type\": \"Organization\", \"name\": \"HoganTaylor\"},\n      \"description\": \"Austin Bryan is a Certified Financial Planner and Principal/COO at HoganTaylor running for Bentonville City Council, Ward 1, in the November 3, 2026 Arkansas general election. His platform: sound finances, smart proactive growth, and cultivating a vibrant community. He has served on the Plan Bentonville Steering Committee, the Parks and Recreation Advisory Board, the Mayor's Community Council, and the Rogers-Lowell Chamber Board, and was founding board chair of Leadership Benton County Alumni.\",\n      \"homeLocation\": {\n        \"@type\": \"City\",\n        \"name\": \"Bentonville\",\n        \"address\": {\"@type\": \"PostalAddress\", \"addressLocality\": \"Bentonville\", \"addressRegion\": \"AR\", \"addressCountry\": \"US\"}\n      },\n      \"knowsAbout\": [\"Financial planning\", \"Municipal budgets\", \"City planning and zoning\", \"Parks and recreation\", \"Local government\"]\n    });\n    document.head.appendChild(s);\n  }\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
